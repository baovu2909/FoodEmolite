<div class="space-y-6">
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-lg font-medium leading-5 text-gray-900">
                Danh Sách Món Ăn
            </h1>
            <p class="mt-2 text-md leading-4 text-gray-500">
                Quản lý thông tin món ăn trên hệ thống
            </p>
        </div>
    </div>

    <app-filter [fields]="filterFields" [initialValues]="filter()" (filterChange)="onFilterChange($event)">
    </app-filter>
    <div></div>
    <app-table [columns]="columns" [rows]="rows()" [currentPage]="page()" [totalPages]="totalPages()"
        [loading]="loading()" [sortBy]="sortBy()" [asc]="asc()" emptyText="Không có món ăn"
        (pageChange)="onPageChange($event)" (sortChange)="onSortChange($event)">
    </app-table>
</div>
