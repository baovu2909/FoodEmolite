<div class="space-y-6">
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-lg font-medium leading-5 text-gray-900">
                Danh Sách Đơn Hàng
            </h1>
            <p class="mt-2 text-md leading-4 text-gray-500">
                Quản lý đơn hàng thuộc cửa hàng của đại lý
            </p>
        </div>
    </div>

    <app-filter [fields]="filterFields" [initialValues]="filter()" (filterChange)="onFilterChange($event)">
    </app-filter>

    <div></div>

    <app-table [columns]="columns" [rows]="rows()" [currentPage]="page()" [totalPages]="totalPages()"
        [loading]="loading() || isSubmitting()" [sortBy]="sortBy()" [asc]="asc()" emptyText="Không có đơn hàng"
        (rowClick)="openDetail($event)" (pageChange)="onPageChange($event)" (sortChange)="onSortChange($event)">
    </app-table>
</div>

@if (isDetailRendered() && selectedOrder()) {
<app-pop-up-agent-order-detail [order]="selectedOrder()!" [isOpen]="isDetailOpen()" [isSubmitting]="isSubmitting()"
    (closed)="closeDetail()" (submitted)="updateStatus($event)">
</app-pop-up-agent-order-detail>
}
