<div class="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 px-4">
  <div class="w-full max-w-md rounded-xl bg-white shadow-2xl">
    <div class="px-6 py-5">
      <h2 class="text-lg font-semibold leading-5 text-gray-900">
        {{ title() }}
      </h2>

      <p class="mt-3 text-sm leading-5 text-gray-500">
        {{ message() }}
      </p>
    </div>

    <div class="flex items-center justify-end gap-3 border-t border-gray-200 px-6 py-4">
      <button
        type="button"
        (click)="cancelled.emit()"
        [disabled]="isSubmitting()"
        class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-50 disabled:opacity-60">
        {{ cancelText() }}
      </button>

      <button
        type="button"
        (click)="confirmed.emit()"
        [disabled]="isSubmitting()"
        class="rounded-md border border-red-200 bg-white px-4 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50 disabled:opacity-60">
        {{ isSubmitting() ? 'Đang xử lý...' : confirmText() }}
      </button>
    </div>
  </div>
</div>
